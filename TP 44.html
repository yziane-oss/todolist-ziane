<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Todo List Stylée</title>

<style>
:root {
    --bg: #f5f7fa;
    --card: white;
    --text: #333;
    --primary: #4CAF50;
    --danger: #e74c3c;
}

body.dark {
    --bg: #1e1e2f;
    --card: #2c2c3e;
    --text: #f1f1f1;
    --primary: #6c5ce7;
}

body {
    font-family: Arial;
    background: var(--bg);
    color: var(--text);
    transition: 0.3s;
}

.container {
    max-width: 500px;
    margin: 40px auto;
    background: var(--card);
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

h2, h3 {
    text-align: center;
}

input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    padding: 10px;
    margin: 5px 2px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.05);
}

.primary {
    background: var(--primary);
    color: white;
}

.danger {
    background: var(--danger);
    color: white;
}

.toggle {
    background: #555;
    color: white;
    float: right;
}

li {
    list-style: none;
    background: rgba(0,0,0,0.05);
    margin: 10px 0;
    padding: 10px;
    border-radius: 10px;
    display: flex;
    flex-direction: column;
}

.task-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.done {
    text-decoration: line-through;
    opacity: 0.6;
}
</style>

</head>
<body>

<div class="container">

<button class="toggle" onclick="toggleDark()">🌙</button>


<div id="auth">
    <h2>Connexion / Inscription</h2>
    <input type="text" id="name" placeholder="Nom">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Mot de passe">
    <button class="primary" onclick="register()">S'inscrire</button>
    <button class="primary" onclick="login()">Se connecter</button>
</div>


<div id="app" style="display:none;">
    <h2 id="welcome"></h2>
    <button class="danger" onclick="logout()">Déconnexion</button>

    <h3>Ajouter une tâche</h3>
    <input type="text" id="title" placeholder="Titre">
    <input type="text" id="desc" placeholder="Description">
    <button class="primary" onclick="addTask()">Ajouter</button>

    <h3>Liste des tâches</h3>
    <ul id="taskList"></ul>
</div>

</div>

<script>

let users = JSON.parse(localStorage.getItem("users")) || [];
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let currentUser = JSON.parse(localStorage.getItem("currentUser")) || null;


function toggleDark() {
    document.body.classList.toggle("dark");
    localStorage.setItem("darkMode", document.body.classList.contains("dark"));
}

if (localStorage.getItem("darkMode") === "true") {
    document.body.classList.add("dark");
}


function register() {
    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    if (!name || !email || !password) {
        alert("Remplis tous les champs !");
        return;
    }

    if (users.find(u => u.email === email)) {
        alert("Email déjà utilisé !");
        return;
    }

    users.push({ name, email, password });
    localStorage.setItem("users", JSON.stringify(users));

    alert("Compte créé !");
}


function login() {
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    let user = users.find(u => u.email === email && u.password === password);

    if (!user) {
        alert("Erreur !");
        return;
    }

    localStorage.setItem("currentUser", JSON.stringify(user));
    showApp();
}


function showApp() {
    currentUser = JSON.parse(localStorage.getItem("currentUser"));

    document.getElementById("auth").style.display = "none";
    document.getElementById("app").style.display = "block";

    document.getElementById("welcome").innerText = "Bonjour " + currentUser.name;

    displayTasks();
}


function addTask() {
    let title = document.getElementById("title").value;
    let desc = document.getElementById("desc").value;

    if (!title) return;

    let task = {
        id: Date.now(),
        title,
        desc,
        done: false,
        user: currentUser.email,
        date: new Date().toLocaleString()
    };

    tasks.push(task);
    localStorage.setItem("tasks", JSON.stringify(tasks));

    displayTasks();
}


function displayTasks() {
    let list = document.getElementById("taskList");
    list.innerHTML = "";

    let userTasks = tasks.filter(t => t.user === currentUser.email);

    userTasks.forEach(task => {
        let li = document.createElement("li");

        li.innerHTML = `
            <div class="task-top">
                <span class="${task.done ? "done" : ""}">
                    <b>${task.title}</b>
                </span>
                <div>
                    <button onclick="toggleTask(${task.id})">✔</button>
                    <button class="danger" onclick="deleteTask(${task.id})">❌</button>
                </div>
            </div>
            <small>${task.desc} - ${task.date}</small>
        `;

        list.appendChild(li);
    });
}


function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    localStorage.setItem("tasks", JSON.stringify(tasks));
    displayTasks();
}


function toggleTask(id) {
    let task = tasks.find(t => t.id === id);
    if (task) task.done = !task.done;

    localStorage.setItem("tasks", JSON.stringify(tasks));
    displayTasks();
}


function logout() {
    localStorage.removeItem("currentUser");
    location.reload();
}


if (currentUser) showApp();

</script>

</body>
</html>
